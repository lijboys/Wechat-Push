name: 🚀 自动部署到 Cloudflare Workers

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔐 登录 Cloudflare 并部署
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name wechat-notify-worker

      - name: 🎉 部署成功
        if: success()
        run: echo "✅ Worker 已自动部署！URL: https://wechat-notify-worker.你的子域名.workers.dev"
