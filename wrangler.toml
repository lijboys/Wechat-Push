name = "wechat-notify-worker"
main = "index.js"                     
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ==================== KV 绑定（必须先创建） ====================
kv_namespaces = [
  { binding = "WX_KV", id = "你的_KV_NAMESPACE_ID_填这里" }
]

# 非敏感配置
[vars]
TEMPLATE_ID = "你的微信模板消息ID"
USER_OPENID = ""
DEFAULT_CLICK_URL = "https://github.com/lijboys/Wechat-Push"   # 可改成你自己的默认详情页

# 部署后执行以下命令设置密钥：
# wrangler secret put AUTH_KEY
# wrangler secret put APP_ID
# wrangler secret put APP_SECRET
