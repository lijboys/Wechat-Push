name = "wechat-notify-worker"
main = "index.js"                          # ← 这里必须改成 index.js（根目录）
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ==================== KV 绑定（必须先创建） ====================
kv_namespaces = [
  { binding = "WX_KV", id = "你的_KV_NAMESPACE_ID_填这里" }
]

# 非敏感配置
[vars]
TEMPLATE_ID = "你的微信模板消息ID"          # 必须在测试号后台创建
USER_OPENID = ""                             # 可选，默认测试用户 openid
DEFAULT_CLICK_URL = "https://github.com/lijboys/movecar"  # 默认跳转地址

# 部署后执行以下命令设置密钥：
# wrangler secret put AUTH_KEY
# wrangler secret put APP_ID
# wrangler secret put APP_SECRET
